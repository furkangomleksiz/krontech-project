server:
  port: ${API_PORT:8080}

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

spring:
  application:
    name: krontech-api
  servlet:
    multipart:
      # Increase limits for media uploads.
      # Override MAX_UPLOAD_FILE_SIZE / MAX_UPLOAD_REQUEST_SIZE in production as needed.
      max-file-size: ${MAX_UPLOAD_FILE_SIZE:20MB}
      max-request-size: ${MAX_UPLOAD_REQUEST_SIZE:22MB}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:krontech}
    username: ${DB_USER:krontech}
    password: ${DB_PASSWORD:krontech}
  jpa:
    hibernate:
      ddl-auto: validate
    # Do not log SQL to stdout (noisy; not typical in production). Use a dev profile or
    # temporary logging.level overrides when you need to trace queries.
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    # Schema is fully owned by Flyway (V1+). Set true only if attaching to a non-empty DB without history.
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  storage:
    # Internal endpoint used by the AWS SDK to connect to S3/MinIO.
    # For local dev this is MinIO in Docker Compose: http://localhost:9000
    # For production AWS S3: https://s3.amazonaws.com (or set to "" to use SDK default)
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:media}
    access-key: ${S3_ACCESS_KEY:minio}
    secret-key: ${S3_SECRET_KEY:minio123}
    region: ${S3_REGION:us-east-1}
    # Path-style access is required for MinIO; set to false for real AWS S3.
    force-path-style: ${S3_FORCE_PATH_STYLE:true}
    # Public endpoint for URLs returned to browsers.
    # Override with a CDN URL in production (e.g. https://cdn.krontech.com.tr).
    # Defaults to the same as endpoint when blank.
    public-endpoint: ${S3_PUBLIC_ENDPOINT:}
  cors:
    # Comma-separated list of allowed origins for browser cross-origin requests.
    # Override with CORS_ALLOWED_ORIGINS env var in each environment.
    # Production: set to the actual domain(s) of the web app.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    issuer: ${JWT_ISSUER:krontech-api}
    secret: ${JWT_SECRET:replace_with_a_long_random_secret}
    access-token-minutes: 60
  rate-limit:
    max-requests-per-minute: 120
  forms:
    rate-limit:
      # Maximum form submissions per IP address per hour (honeypot bypasses are not counted).
      max-per-hour: ${FORM_RATE_LIMIT_PER_HOUR:5}
  webhook:
    form-submission:
      # Set to a non-empty URL to enable outbound webhook delivery on each new submission.
      url: ${FORM_WEBHOOK_URL:}
  publishing:
    # Interval in ms between scheduled-publish checks. Default: 60 seconds.
    scheduler-delay-ms: ${PUBLISHING_SCHEDULER_DELAY_MS:60000}
  web:
    # Base URL of the Next.js frontend.
    # Used by CacheService to call the on-demand ISR revalidation endpoint.
    # In local dev: http://localhost:3000
    # In Docker Compose (API in container): http://host.docker.internal:3000
    # In production: https://www.krontech.com.tr
    url: ${WEB_APP_URL:http://localhost:3000}
    # Shared secret for POST /api/revalidate.
    # Must match the REVALIDATE_SECRET env var set in the Next.js app.
    # If blank, frontend revalidation is skipped (Redis eviction still runs).
    revalidate-secret: ${REVALIDATE_SECRET:}
