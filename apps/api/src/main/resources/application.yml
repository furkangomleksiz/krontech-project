server:
  port: ${API_PORT:8080}

spring:
  application:
    name: krontech-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:krontech}
    username: ${DB_USER:krontech}
    password: ${DB_PASSWORD:krontech}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  auth:
    issuer: ${JWT_ISSUER:krontech-api}
    secret: ${JWT_SECRET:replace_with_a_long_random_secret}
    access-token-minutes: 60
  rate-limit:
    max-requests-per-minute: 120
