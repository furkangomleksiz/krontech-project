proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=web_cache:10m
    max_size=100m
    inactive=10m
    use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Next.js static assets are content-addressed (hashed filenames) — cache forever.
    location /_next/static/ {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_cache        web_cache;
        proxy_cache_valid  200 365d;
        add_header         X-Cache-Status $upstream_cache_status;
    }

    # Admin panel and Next.js route handlers (including /api/revalidate) — never cache.
    location ~ ^/(admin|api)/ {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_no_cache     1;
        proxy_cache_bypass 1;
    }

    # Public pages — 60-second shared cache with thundering-herd protection.
    # ISR on-demand revalidation invalidates Next.js within seconds of a publish;
    # Nginx picks up the fresh response on the next request after its 60s TTL.
    location / {
        proxy_pass            http://web:3000;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $remote_addr;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_cache           web_cache;
        proxy_cache_valid     200 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock      on;
        add_header            X-Cache-Status $upstream_cache_status;
    }
}
