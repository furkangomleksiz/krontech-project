services:
  postgres:
    image: postgres:16-alpine
    container_name: krontech-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-krontech}
      POSTGRES_USER: ${DB_USER:-krontech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-krontech}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krontech} -d ${DB_NAME:-krontech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: krontech-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: krontech-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"   # S3 API — used by the Spring Boot API for uploads
      - "9001:9001"   # MinIO Console — http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the media bucket and applies a public-read policy on first start.
  # The Spring Boot API also runs bucket init via @PostConstruct, so this container
  # is optional but speeds things up and ensures the bucket exists before the API starts.
  minio-init:
    image: minio/mc:latest
    container_name: krontech-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-media}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
        mc mb --ignore-existing local/$$S3_BUCKET &&
        mc anonymous set public local/$$S3_BUCKET &&
        echo 'Bucket $$S3_BUCKET is ready.' &&
        exit 0
      "
    restart: "no"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: krontech-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # Always 8080 inside the container; map the host side with API_PORT below.
      API_PORT: "8080"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-krontech}
      DB_USER: ${DB_USER:-krontech}
      DB_PASSWORD: ${DB_PASSWORD:-krontech}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      # Browser-visible MinIO URLs (API port 9000 is published on the host).
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-media}
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret}
      JWT_ISSUER: ${JWT_ISSUER:-krontech-api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Backend → Next.js on-demand revalidation (same Docker network).
      WEB_APP_URL: http://web:3000
      # Non-empty default so publish/unpublish purges Next ISR without a local .env file.
      # Override REVALIDATE_SECRET in production (must match the web service).
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-local-compose-revalidate-secret}
      MAX_UPLOAD_FILE_SIZE: ${MAX_UPLOAD_FILE_SIZE:-20MB}
      MAX_UPLOAD_REQUEST_SIZE: ${MAX_UPLOAD_REQUEST_SIZE:-22MB}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api-docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-tr}
        NEXT_PUBLIC_SUPPORTED_LOCALES: ${NEXT_PUBLIC_SUPPORTED_LOCALES:-tr,en}
        # Host browser → API (published port). Override if API_HOST_PORT differs from 8080.
        NEXT_PUBLIC_API_BASE_URL: ${DOCKER_NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
        API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8080/api/v1}
    container_name: krontech-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-local-compose-revalidate-secret}
      # Runtime override for server/middleware (defaults match Dockerfile).
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8080/api/v1}

volumes:
  postgres_data:
  redis_data:
  minio_data:
