version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: krontech-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-krontech}
      POSTGRES_USER: ${DB_USER:-krontech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-krontech}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-krontech} -d ${DB_NAME:-krontech}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: krontech-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: krontech-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
