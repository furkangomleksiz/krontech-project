# Docker secrets overlay for production / staging environments.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.secrets.yml up
#
# Before running, create the secrets directory and populate each file with the real value:
#
#   mkdir -p secrets
#   echo "your-long-random-jwt-secret" > secrets/jwt_secret.txt
#   echo "your-db-password"            > secrets/db_password.txt
#   echo "your-s3-access-key"          > secrets/s3_access_key.txt
#   echo "your-s3-secret-key"          > secrets/s3_secret_key.txt
#   echo "your-revalidate-secret"      > secrets/revalidate_secret.txt
#
# The secrets/ directory is gitignored — never commit these files.
#
# How it works:
#   Each secret file is mounted into the API container at a path that mirrors the
#   Spring property key (e.g. /run/secrets/app/auth/secret → property app.auth.secret).
#   Spring Boot reads the directory tree via:
#     spring.config.import: optional:configtree:/run/secrets/
#   (already set in application.yml)
#
# In production Docker Swarm you replace the file: references with external: true
# and create secrets with: echo "value" | docker secret create <name> -
#
# For Kubernetes, use a Secret manifest and mount it at /run/secrets with
# the same directory-path naming convention.

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_password:
    file: ./secrets/db_password.txt
  s3_access_key:
    file: ./secrets/s3_access_key.txt
  s3_secret_key:
    file: ./secrets/s3_secret_key.txt
  revalidate_secret:
    file: ./secrets/revalidate_secret.txt

services:
  postgres:
    secrets:
      - source: db_password
        # Mounts the password file at the path Docker's postgres image reads for POSTGRES_PASSWORD_FILE.
        target: /run/secrets/db_password
    environment:
      # Replace the plain-text password with the _FILE convention used by the postgres image.
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password

  api:
    secrets:
      # Each target path maps to a Spring property via configtree:
      #   /run/secrets/app/auth/secret          → app.auth.secret
      #   /run/secrets/spring/datasource/password → spring.datasource.password
      #   /run/secrets/app/storage/access-key    → app.storage.access-key
      #   /run/secrets/app/storage/secret-key    → app.storage.secret-key
      #   /run/secrets/app/web/revalidate-secret → app.web.revalidate-secret
      - source: jwt_secret
        target: /run/secrets/app/auth/secret
      - source: db_password
        target: /run/secrets/spring/datasource/password
      - source: s3_access_key
        target: /run/secrets/app/storage/access-key
      - source: s3_secret_key
        target: /run/secrets/app/storage/secret-key
      - source: revalidate_secret
        target: /run/secrets/app/web/revalidate-secret
    environment:
      # These five env vars are replaced by the secret files above.
      # Unsetting them ensures the configtree values win (env vars take higher priority in Spring).
      JWT_SECRET: ""
      DB_PASSWORD: ""
      S3_ACCESS_KEY: ""
      S3_SECRET_KEY: ""
      REVALIDATE_SECRET: ""

  web:
    secrets:
      - source: revalidate_secret
        target: /run/secrets/revalidate_secret
    environment:
      # Next.js reads REVALIDATE_SECRET from env — override to read from file at runtime.
      # If your deployment platform supports _FILE conventions, use that; otherwise inject
      # the value via an entrypoint script that reads /run/secrets/revalidate_secret.
      REVALIDATE_SECRET: ""
